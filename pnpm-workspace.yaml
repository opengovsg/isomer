packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"
  # Standalone scripts under tooling/build (not covered by tooling/*)
  - "tooling/build/github"
  - "tooling/build/amplify"
  - "tooling/build/1password"
  - "tooling/build/scripts/publishing"

linkWorkspacePackages: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - next
  - "@next/env"
  - react
  - react-dom
  - "@opengovsg/*"
  - storybook
  - "@storybook/*"
  - eslint-plugin-storybook
  # Rollup publishes many fresh optional platform packages (e.g. @rollup/rollup-linux-*-musl)
  - rollup
  - "@rollup/*"

publicHoistPattern:
  - "*eslint-plugin*"
  - "*@opengovsg/oui*"
  - "*prisma*"
  - pg
  - oxlint
  - oxlint-tsgolint
  - rimraf
  - tsc-alias

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - esbuild
  - prisma

