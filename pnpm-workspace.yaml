packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"
  # Standalone scripts under tooling/build (not covered by tooling/*)
  - "tooling/build/github"
  - "tooling/build/amplify"
  - "tooling/build/1password"
  - "tooling/build/scripts/publishing"
  # Bruno API collections, not an npm package
  - "!tooling/bruno"

linkWorkspacePackages: true

blockExoticSubdeps: true

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  # If there is a CVE, exclude it here so we can update it immediately without waiting for the minimum release age to pass.
  - "@opengovsg/*"

publicHoistPattern:
  - "*eslint-plugin*"
  - "*@opengovsg/oui*"
  - "*prisma*"
  - pg
  - oxfmt
  - oxlint
  - oxlint-tsgolint
  - rimraf
  - tsc-alias

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
  # pnpm 11 made strictDepBuilds true by default — any transitive dep with an
  # install script that isn't explicitly allowed/ignored fails the install with
  # ERR_PNPM_IGNORED_BUILDS. The entries below preserve the pre-pnpm-11 behavior
  # of skipping these scripts (none are needed for our build).
  "@datadog/native-appsec": false
  "@datadog/native-iast-taint-tracking": false
  "@datadog/native-metrics": false
  "@datadog/pprof": false
  "@parcel/watcher": false
  core-js-pure: false
  cpu-features: false
  dd-trace: false
  msw: false
  protobufjs: false
  sharp: false
  ssh2: false

patchedDependencies:
  next@16.2.11: patches/next@16.2.11.patch

