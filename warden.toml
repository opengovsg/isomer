# Warden Configuration
# https://github.com/getsentry/warden
#
# Warden reviews code using AI-powered skills triggered by GitHub events.
# Built-in skills are available by name. Add more skills as needed.
#
# Add built-in reviews with:
#   warden add security-review
#   warden add code-review

version = 1

# Default settings inherited by all skills
[defaults]
# Severity levels: critical, high, medium, low, info, off
# failOn: minimum severity that fails the check
failOn = "off"
# reportOn: minimum severity that creates PR annotations
reportOn = "medium"

# Skills define what to analyze and when to run
# Add built-in reviews with:
#   warden add security-review
#   warden add code-review
#
# Example skill with path filters and triggers:
#
# [[skills]]
# name = "security-review"
# paths = ["src/**/*.ts", "src/**/*.tsx"]
# ignorePaths = ["**/*.test.ts", "**/__fixtures__/**"]
#
# [[skills.triggers]]
# type = "pull_request"
# actions = ["opened", "synchronize", "reopened"]

[[skills]]
name = "security-review"
paths = [
  "apps/**/*.ts",
  "apps/**/*.tsx",
  "packages/**/*.ts",
  "packages/**/*.tsx",
  "tooling/**/*.ts",
  "tooling/**/*.tsx",
  "apps/studio/prisma/schema.prisma",
]
ignorePaths = [
  "**/node_modules/**",
  "**/dist/**",
  "**/build/**",
  "**/coverage/**",
  "**/storybook-static/**",
  "**/generated/**",
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/__test__/**",
  "**/__tests__/**",
  "**/__fixtures__/**",
  "**/__mocks__/**",
  "**/tests/**",
  "**/*.stories.ts",
  "**/*.stories.tsx",
  "**/*.config.js",
  "**/*.config.ts",
  "**/*.config.mjs",
  "**/*.config.cjs",
  "**/next-env.d.ts",
  "**/*.tsbuildinfo",
  "apps/studio/prisma/migrations/**",
  "apps/studio/public/**",
  "packages/components/public/**",
]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

[[skills]]
name = "code-review"
paths = [
  "apps/**/*.ts",
  "apps/**/*.tsx",
  "packages/**/*.ts",
  "packages/**/*.tsx",
  "tooling/**/*.ts",
  "tooling/**/*.tsx",
  "apps/studio/prisma/schema.prisma",
]
ignorePaths = [
  "**/node_modules/**",
  "**/dist/**",
  "**/build/**",
  "**/coverage/**",
  "**/storybook-static/**",
  "**/generated/**",
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/__test__/**",
  "**/__tests__/**",
  "**/__fixtures__/**",
  "**/__mocks__/**",
  "**/tests/**",
  "**/*.stories.ts",
  "**/*.stories.tsx",
  "**/*.config.js",
  "**/*.config.ts",
  "**/*.config.mjs",
  "**/*.config.cjs",
  "**/next-env.d.ts",
  "**/*.tsbuildinfo",
  "apps/studio/prisma/migrations/**",
  "apps/studio/public/**",
  "packages/components/public/**",
]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]
