name: CI

on:
  push:
    branches:
      - main
      - staging
      - production
  pull_request:
    types: [opened, synchronize]

env:
  LOG_LEVEL: silent

jobs:
  optimize_ci:
    runs-on: ubuntu-latest # or whichever runner you use for your CI
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@402a89bc8aa6db18ae1f9c61953d001d5f9d828f
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_OPTIMIZER_TOKEN }}
  # Detect which areas changed so dependent jobs can opt out when irrelevant.
  changes:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.filter.outputs.components }}
      template_or_components: ${{ steps.filter.outputs.template_or_components }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          # Covers both source/asset changes and dependency changes
          # (a new dependency edits packages/components/package.json).
          filters: |
            components:
              - 'packages/components/**'
            template_or_components:
              - 'packages/components/**'
              - 'tooling/template/**'
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm run lint && pnpm run lint:ws

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: "./apps/studio/Dockerfile"
          failure-threshold: "error"

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Format
        run: pnpm run format

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm run typecheck

  components-bundle-size:
    name: Components bundle size
    needs: [optimize_ci, changes]
    # Only meaningful on PRs (needs a `main` baseline to diff against), and only
    # when the components package itself changed (source/assets or dependencies).
    if: github.event_name == 'pull_request' && needs.optimize_ci.outputs.skip == 'false' && needs.changes.outputs.components == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      # Copy the scripts out of the tree so they survive the `main` checkout below
      # (they only exist on this PR branch).
      - name: Stage scripts
        run: cp .github/scripts/measure-template-bundle.sh .github/scripts/comment-template-bundle-size.sh "$RUNNER_TEMP/"

      # The Template (next build --webpack) is the real consumer of the components
      # package; its webpack-bundled, tree-shaken, gzipped output is what ships.
      - name: Build Template (PR branch)
        run: |
          rm -rf packages/components/dist tooling/template/out tooling/template/.next
          pnpm --filter @opengovsg/isomer-components run build:module
          pnpm --filter isomer-base-template run build:template

      - name: Measure PR bundle
        id: pr
        run: bash "$RUNNER_TEMP/measure-template-bundle.sh" tooling/template/out >> "$GITHUB_OUTPUT"

      - name: Build Template (main)
        id: base
        run: |
          git fetch --no-tags --depth=1 origin main
          git checkout --force FETCH_HEAD
          # main may have a different lockfile/deps than the PR branch.
          pnpm install --frozen-lockfile
          # Drop the PR build artifacts so we measure main cleanly.
          rm -rf packages/components/dist tooling/template/out tooling/template/.next
          pnpm --filter @opengovsg/isomer-components run build:module
          pnpm --filter isomer-base-template run build:template
          bash "$RUNNER_TEMP/measure-template-bundle.sh" tooling/template/out >> "$GITHUB_OUTPUT"

      # Save metrics + the comment script into an artifact so post-pr-comment.yml
      # can post the comment from the base-repo context (where GITHUB_TOKEN always
      # has write access, even for fork PRs).
      - name: Save bundle size metadata
        run: |
          mkdir -p /tmp/bundle-size-metadata
          cat > /tmp/bundle-size-metadata/values.env <<'ENVEOF'
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_FRAMEWORK=${{ steps.pr.outputs.framework }}
          PR_VENDOR=${{ steps.pr.outputs.vendor }}
          PR_PAGE=${{ steps.pr.outputs.page }}
          PR_CSS=${{ steps.pr.outputs.css }}
          PR_TOTAL=${{ steps.pr.outputs.total }}
          BASE_FRAMEWORK=${{ steps.base.outputs.framework }}
          BASE_VENDOR=${{ steps.base.outputs.vendor }}
          BASE_PAGE=${{ steps.base.outputs.page }}
          BASE_CSS=${{ steps.base.outputs.css }}
          BASE_TOTAL=${{ steps.base.outputs.total }}
          ENVEOF
          cp "$RUNNER_TEMP/comment-template-bundle-size.sh" /tmp/bundle-size-metadata/

      - name: Upload bundle size metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-size-metadata
          path: /tmp/bundle-size-metadata/
          retention-days: 7

  test-studio:
    name: Test Studio (${{ matrix.shard }}/${{ matrix.total_shards }})
    needs: optimize_ci
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false'
    strategy:
      fail-fast: false # so that we can run all shards and one shard can fail without failing the entire job
      matrix:
        shard: [1, 2] # extend this if we need to run more shards concurrently
        total_shards: [2]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install Playwright (Chromium)
        # Required by the vitest "browser" project (Vitest Browser Mode).
        run: pnpm --filter isomer-studio exec playwright install chromium
      - name: Install dependencies
        # Not using test:unit dependency in Turbo because Datadog Test Visibility requires only the test suite to be run
        run: pnpm exec turbo run generate --filter=isomer-studio
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-studio
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Test Studio
        # Loose env mode required for env vars to be passed to the run
        run: pnpm exec turbo test-ci:unit --filter=isomer-studio --env-mode=loose -- --shard=${{ matrix.shard }}/${{ matrix.total_shards }}
        env:
          # Required to allow Datadog to trace Vitest tests
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          # Set timezone to Singapore to ensure that the tests are run in the correct timezone
          TZ: Asia/Singapore

  test-components:
    name: Test Components
    needs: optimize_ci
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install Playwright (Chromium)
        # Required by the vitest "browser" project (Vitest Browser Mode).
        run: pnpm --filter @opengovsg/isomer-components exec playwright install chromium
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-studio
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Test Components
        run: pnpm exec turbo test-ci:unit --filter=@opengovsg/isomer-components --env-mode=loose
        env:
          # Required to allow Datadog to trace Vitest tests
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          # Set timezone to Singapore to ensure that the tests are run in the correct timezone
          TZ: Asia/Singapore

  test-template:
    name: Test Template bundle pruning
    needs: [optimize_ci, changes]
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false' && needs.changes.outputs.template_or_components == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-template
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Test template bundle pruning
        run: pnpm exec turbo test-ci:unit --filter=isomer-base-template --env-mode=loose
        env:
          # Required to allow Datadog to trace Vitest tests
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          TZ: Asia/Singapore

  test-validators:
    name: Test Validators
    needs: optimize_ci
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-studio
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Test Validators
        run: pnpm exec turbo test-ci:unit --filter=@isomer/validators --env-mode=loose
        env:
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          TZ: Asia/Singapore

  test-pgboss:
    name: Test pgboss
    needs: optimize_ci
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Start test containers
        run: pnpm exec turbo run setup:test --filter=@isomer/pgboss
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-pgboss
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Test pgboss
        run: pnpm exec turbo test-ci:unit --filter=@isomer/pgboss --env-mode=loose
        env:
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          TZ: Asia/Singapore

  publishing-script-tests:
    name: Publishing script tests
    needs: optimize_ci
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-publishing
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Test publishing script
        # Loose env mode required for env vars to be passed to the run
        run: pnpm exec turbo test-ci:unit --filter=publishing --env-mode=loose
        env:
          # Required to allow Datadog to trace Vitest tests
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          # Set timezone to Singapore to ensure that the tests are run in the correct timezone
          TZ: Asia/Singapore
      - name: Test full template build from publishing script output
        run: pnpm exec turbo test-ci:build --filter=publishing --env-mode=loose
        env:
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          TZ: Asia/Singapore

  end-to-end-tests:
    name: End-to-end tests
    needs: optimize_ci
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install Playwright (Chromium)
        run: pnpm --filter isomer-studio exec playwright install chromium
      - name: Load .env file
        uses: opengovsg/dotenv@eff1dce037c4c0143cc4180a810511024c2560c0 # v2
        with:
          path: apps/studio
          mode: test
      - name: Next.js cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ github.workspace }}/apps/studio/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - name: Build Studio app
        # Loose env mode required for env vars to be passed to the run
        run: pnpm exec turbo build --filter=isomer-studio --env-mode=loose
      - name: Start test containers
        run: pnpm run setup:test
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-studio
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Seed testing db
        run: pnpm exec turbo db:seed
      - name: Run Playwright tests
        run: pnpm exec turbo test-ci:e2e --filter=isomer-studio --env-mode=loose

      - name: Stop test containers
        run: pnpm run teardown

      - name: Upload test results
        if: ${{ !cancelled() }}
        id: upload-test-results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Unique per run so that re-runs from the same PR don't collide.
          name: e2e-test-results-${{ github.run_id }}
          path: apps/studio/tests/e2e/test-results
          retention-days: 7
          if-no-files-found: warn

      # Posting a PR comment requires write access, but GitHub restricts
      # GITHUB_TOKEN to read-only for `pull_request` events from forks — no
      # `permissions:` declaration overrides this. The actual comment is posted
      # by post-pr-comment.yml, which uses a `workflow_run` trigger and runs in
      # the base-repo context where write access is available. We pass the PR
      # number and artifact URL through a small artifact because the two
      # workflows run in separate contexts and can't share environment variables.
      - name: Save E2E comment metadata
        if: ${{ !cancelled() && github.event_name == 'pull_request' && steps.upload-test-results.outputs.artifact-url != '' }}
        run: |
          mkdir -p /tmp/e2e-metadata
          echo "${{ github.event.pull_request.number }}" > /tmp/e2e-metadata/pr-number.txt
          echo "${{ steps.upload-test-results.outputs.artifact-url }}" > /tmp/e2e-metadata/artifact-url.txt

      - name: Upload E2E comment metadata
        if: ${{ !cancelled() && github.event_name == 'pull_request' && steps.upload-test-results.outputs.artifact-url != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-comment-metadata
          path: /tmp/e2e-metadata/
          retention-days: 1
          if-no-files-found: error
