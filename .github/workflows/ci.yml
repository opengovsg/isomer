name: CI

on:
  push:
    branches:
      - main
      - staging
      - production
  pull_request:
    types: [opened, synchronize]

env:
  LOG_LEVEL: silent

jobs:
  optimize_ci:
    runs-on: ubuntu-latest # or whichever runner you use for your CI
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@b87de3d800df90082f5f1ba2817f4e1a6f3b0a7b
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_OPTIMIZER_TOKEN }}
  # Detect which areas changed so dependent jobs can opt out when irrelevant.
  changes:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.filter.outputs.components }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          # Covers both source/asset changes and dependency changes
          # (a new dependency edits packages/components/package.json).
          filters: |
            components:
              - 'packages/components/**'
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm run build
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm run lint && pnpm run lint:ws

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: "./apps/studio/Dockerfile"
          failure-threshold: "error"

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Format
        run: pnpm run format

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: pnpm run typecheck

  components-bundle-size:
    name: Components bundle size
    needs: [optimize_ci, changes]
    # Only meaningful on PRs (needs a `main` baseline to diff against), and only
    # when the components package itself changed (source/assets or dependencies).
    if: github.event_name == 'pull_request' && needs.optimize_ci.outputs.skip == 'false' && needs.changes.outputs.components == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup
        uses: ./.github/actions/setup

      # Copy the scripts out of the tree so they survive the `main` checkout below
      # (they only exist on this PR branch).
      - name: Stage scripts
        run: cp .github/scripts/measure-template-bundle.sh .github/scripts/comment-template-bundle-size.sh "$RUNNER_TEMP/"

      # The Template (next build --webpack) is the real consumer of the components
      # package; its webpack-bundled, tree-shaken, gzipped output is what ships.
      - name: Build Template (PR branch)
        run: |
          rm -rf packages/components/dist tooling/template/out tooling/template/.next
          pnpm --filter @opengovsg/isomer-components run build:module
          pnpm --filter isomer-base-template run build:template

      - name: Measure PR bundle
        id: pr
        run: bash "$RUNNER_TEMP/measure-template-bundle.sh" tooling/template/out >> "$GITHUB_OUTPUT"

      - name: Build Template (main)
        id: base
        run: |
          git fetch --no-tags --depth=1 origin main
          git checkout --force FETCH_HEAD
          # main may have a different lockfile/deps than the PR branch.
          pnpm install --frozen-lockfile
          # Drop the PR build artifacts so we measure main cleanly.
          rm -rf packages/components/dist tooling/template/out tooling/template/.next
          pnpm --filter @opengovsg/isomer-components run build:module
          pnpm --filter isomer-base-template run build:template
          bash "$RUNNER_TEMP/measure-template-bundle.sh" tooling/template/out >> "$GITHUB_OUTPUT"

      - name: Comment bundle size delta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_FRAMEWORK: ${{ steps.pr.outputs.framework }}
          PR_VENDOR: ${{ steps.pr.outputs.vendor }}
          PR_PAGE: ${{ steps.pr.outputs.page }}
          PR_CSS: ${{ steps.pr.outputs.css }}
          PR_TOTAL: ${{ steps.pr.outputs.total }}
          BASE_FRAMEWORK: ${{ steps.base.outputs.framework }}
          BASE_VENDOR: ${{ steps.base.outputs.vendor }}
          BASE_PAGE: ${{ steps.base.outputs.page }}
          BASE_CSS: ${{ steps.base.outputs.css }}
          BASE_TOTAL: ${{ steps.base.outputs.total }}
        run: bash "$RUNNER_TEMP/comment-template-bundle-size.sh"

  unit-integration-tests:
    name: Unit & integration tests
    needs: optimize_ci
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        # Not using test:unit dependency in Turbo because Datadog Test Visibility requires only the test suite to be run
        run: pnpm exec turbo run generate --filter=isomer-studio
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-studio
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Test Studio
        # Loose env mode required for env vars to be passed to the run
        run: pnpm exec turbo test-ci:unit --filter=isomer-studio --env-mode=loose
        env:
          # Required to allow Datadog to trace Vitest tests
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          # Set timezone to Singapore to ensure that the tests are run in the correct timezone
          TZ: Asia/Singapore
      - name: Test Components
        run: pnpm exec turbo test-ci:unit --filter=@opengovsg/isomer-components --env-mode=loose
        env:
          # Required to allow Datadog to trace Vitest tests
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          # Set timezone to Singapore to ensure that the tests are run in the correct timezone
          TZ: Asia/Singapore
      - name: Test Validators
        run: pnpm exec turbo test-ci:unit --filter=@isomer/validators --env-mode=loose
        env:
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}

  publishing-script-tests:
    name: Publishing script tests
    needs: optimize_ci
    runs-on: ubuntu-latest
    if: needs.optimize_ci.outputs.skip == 'false'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup
        uses: ./.github/actions/setup
      - name: Configure Datadog Test Visibility
        uses: datadog/test-visibility-github-action@4e7afb05b464fd349275e41e65a7f4de83e7f46b # v2.10.0
        with:
          languages: js
          service: isomer-publishing
          api_key: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}
      - name: Test publishing script
        # Loose env mode required for env vars to be passed to the run
        run: pnpm exec turbo test-ci:unit --filter=publishing --env-mode=loose
        env:
          # Required to allow Datadog to trace Vitest tests
          NODE_OPTIONS: -r ${{ env.DD_TRACE_PACKAGE }} --import ${{ env.DD_TRACE_ESM_IMPORT }}
          # Set timezone to Singapore to ensure that the tests are run in the correct timezone
          TZ: Asia/Singapore

  end-to-end-tests:
    name: End-to-end tests
    needs: optimize_ci
    if: needs.optimize_ci.outputs.skip == 'false'
    # Runs the e2e harness via the shared reusable workflow so the same suite
    # can be invoked inline from other workflows. Only the Datadog key is
    # passed (least privilege); the github context (PR payload, run_id) is
    # inherited automatically.
    uses: ./.github/workflows/e2e-tests.yml
    secrets:
      DD_API_KEY_GITHUB_ACTIONS: ${{ secrets.DD_API_KEY_GITHUB_ACTIONS }}

  # Posting a PR comment requires write access, but GitHub restricts
  # GITHUB_TOKEN to read-only for `pull_request` events from forks — no
  # `permissions:` declaration overrides this. The actual comment is posted
  # by post-pr-comment.yml, which uses a `workflow_run` trigger and runs in
  # the base-repo context where write access is available. We pass the PR
  # number and artifact URL through a small artifact because the two
  # workflows run in separate contexts and can't share environment variables.
  e2e-comment-metadata:
    needs: end-to-end-tests
    if: ${{ !cancelled() && github.event_name == 'pull_request' && needs.end-to-end-tests.outputs.artifact-url != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Save E2E comment metadata
        run: |
          mkdir -p /tmp/e2e-metadata
          echo "${{ github.event.pull_request.number }}" > /tmp/e2e-metadata/pr-number.txt
          echo "${{ needs.end-to-end-tests.outputs.artifact-url }}" > /tmp/e2e-metadata/artifact-url.txt

      - name: Upload E2E comment metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-comment-metadata
          path: /tmp/e2e-metadata/
          retention-days: 1
          if-no-files-found: error
