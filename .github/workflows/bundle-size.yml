name: bundle-size

# Named without whitespace so it's easy to grep/reference by exact string —
# post-bundle-size-comment.yml's `workflow_run.workflows` list must match
# this name exactly.
#
# Split out of ci.yml so that post-bundle-size-comment.yml (which only needs
# this job's artifact) can fire via `workflow_run` as soon as this job
# finishes, instead of waiting on ci.yml's slower jobs (end-to-end-tests,
# test-studio, etc). See post-bundle-size-comment.yml for why a
# `workflow_run` trigger is needed at all.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  optimize_ci:
    runs-on: ubuntu-latest # or whichever runner you use for your CI
    outputs:
      skip: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Optimize CI
        id: check_skip
        uses: withgraphite/graphite-ci-action@402a89bc8aa6db18ae1f9c61953d001d5f9d828f
        with:
          graphite_token: ${{ secrets.GRAPHITE_CI_OPTIMIZER_TOKEN }}

  # Detect which areas changed so components-bundle-size can opt out when irrelevant.
  changes:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.filter.outputs.components }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          # Covers both source/asset changes and dependency changes
          # (a new dependency edits packages/components/package.json).
          filters: |
            components:
              - 'packages/components/**'

  components-bundle-size:
    name: Components bundle size
    needs: [optimize_ci, changes]
    # Only meaningful when the components package itself changed (source/assets
    # or dependencies) — needs a `main` baseline to diff against.
    if: needs.optimize_ci.outputs.skip == 'false' && needs.changes.outputs.components == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      # Copy the script out of the tree so it survives the `main` checkout below
      # (it only exists on this PR branch).
      - name: Stage scripts
        run: cp .github/scripts/measure-template-bundle.sh "$RUNNER_TEMP/"

      # The Template (next build --webpack) is the real consumer of the components
      # package; its webpack-bundled, tree-shaken, gzipped output is what ships.
      - name: Build Template (PR branch)
        run: |
          rm -rf packages/components/dist tooling/template/out tooling/template/.next
          pnpm --filter @opengovsg/isomer-components run build:module
          pnpm --filter isomer-base-template run build:template

      - name: Measure PR bundle
        id: pr
        run: bash "$RUNNER_TEMP/measure-template-bundle.sh" tooling/template/out >> "$GITHUB_OUTPUT"

      - name: Build Template (main)
        id: base
        run: |
          git fetch --no-tags --depth=1 origin main
          git checkout --force FETCH_HEAD
          # main may have a different lockfile/deps than the PR branch.
          pnpm install --frozen-lockfile
          # Drop the PR build artifacts so we measure main cleanly.
          rm -rf packages/components/dist tooling/template/out tooling/template/.next
          pnpm --filter @opengovsg/isomer-components run build:module
          pnpm --filter isomer-base-template run build:template
          bash "$RUNNER_TEMP/measure-template-bundle.sh" tooling/template/out >> "$GITHUB_OUTPUT"

      # Save metrics (data only, no scripts) into an artifact so
      # post-bundle-size-comment.yml can post the comment from the base-repo
      # context (where GITHUB_TOKEN always has write access, even for fork PRs).
      # post-bundle-size-comment.yml treats every value here as untrusted data —
      # it never sources this file or executes anything this job staged; it
      # re-checks-out and runs its own trusted copy of the comment script. See
      # post-bundle-size-comment.yml for why.
      - name: Save bundle size metadata
        run: |
          mkdir -p /tmp/bundle-size-metadata
          cat > /tmp/bundle-size-metadata/values.env <<'ENVEOF'
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_FRAMEWORK=${{ steps.pr.outputs.framework }}
          PR_VENDOR=${{ steps.pr.outputs.vendor }}
          PR_PAGE=${{ steps.pr.outputs.page }}
          PR_CSS=${{ steps.pr.outputs.css }}
          PR_TOTAL=${{ steps.pr.outputs.total }}
          BASE_FRAMEWORK=${{ steps.base.outputs.framework }}
          BASE_VENDOR=${{ steps.base.outputs.vendor }}
          BASE_PAGE=${{ steps.base.outputs.page }}
          BASE_CSS=${{ steps.base.outputs.css }}
          BASE_TOTAL=${{ steps.base.outputs.total }}
          ENVEOF

      - name: Upload bundle size metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-size-metadata
          path: /tmp/bundle-size-metadata/
          retention-days: 7
