name: 🤖 Code Review

on:
  pull_request:
    types:
      - opened # Only run for new Dependabot PRs
      - labeled # Allow manual triggering by adding the 'review-dependency-upgrade' label

permissions:
  contents: read
  pull-requests: read
  issues: write # needed to remove the 'review-dependency-upgrade' label after review
  id-token: write # needed for claude-code-action's GitHub App token (used to post comments)

jobs:
  dependabot:
    # Only run for Dependabot PRs; label trigger allows manual re-runs
    # 'opened' events have no label, so pass them through unconditionally
    # for 'labeled' events, only proceed for this specific label
    if: >-
      startsWith(github.event.pull_request.head.ref, 'dependabot/') &&
      (
        github.event.action == 'opened' ||
        github.event.label.name == 'review-dependency-upgrade'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Claude Code
        uses: anthropics/claude-code-action@593d7a5c4e0073569f74772c2b7b64c30ec14707 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-sonnet-4-6
          allowed_bots: dependabot[bot]
          allowed_tools: |
            Bash(gh pr view:*)
            Bash(gh pr diff:*)
            Bash(grep:*)
            Bash(find:*)
            Bash(cat:*)
            Bash(git diff:*)
            WebFetch(domain:github.com)
            WebFetch(domain:raw.githubusercontent.com)
            WebFetch(domain:npmjs.com)
            WebFetch(domain:registry.npmjs.org)
          prompt: |
            Review this Dependabot dependency upgrade. Research the official changelog for all
            intermediate versions — never rely on training data for version specifics. For each
            breaking change, check whether the codebase uses the affected API. Output the report
            (the action will post it as a PR comment):

            ## 🤖 Dependency upgrade review
            ### <pkg>: <from> → <to>
            **Verdict:** BREAKS | SAFE | NEEDS REVIEW

            | Version | Breaking change | Impact | Location | Migration |
            |---------|----------------|--------|----------|-----------|

            Impact: Affects (usage found), Safe (no usage), Uncertain (ambiguous). Sort Affects first.
            No breaking changes → SAFE, single row noting none found.
            Changelog unavailable → NEEDS REVIEW, list sources checked.
            Multiple packages in one PR → one section per package, one combined comment.
            Never modify tracked files.

      # Always remove the label after review (success or failure) so it can be re-added to re-trigger
      - name: Remove 'review-dependency-upgrade' label
        if: >-
          always() &&
          github.event.action == 'labeled' &&
          github.event.label.name == 'review-dependency-upgrade'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'review-dependency-upgrade',
            })
