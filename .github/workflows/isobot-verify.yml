name: "🤖 IsoBot: Verify"

# Translates a PR's free-text "Manual Verification Steps" checklist into a
# committed, convention-following Playwright e2e test via the /isobot-verify
# skill (anthropics/claude-code-action). Design source of truth:
# docs/adr/0003-ai-generated-verification-tests.md. The skill contract lives in
# .claude/skills/isobot-verify/SKILL.md.
#
# Runs ONLY when a draft PR is marked ready-for-review — not on every push and
# not on `opened`. Keeping the PR in draft while iterating avoids generating a
# test before the verification steps are finalised; the diff-based idempotency
# guard in the skill makes re-triggers a no-op once a test exists.
#
# ──────────────────────────────────────────────────────────────────────────
# WHY THIS WORKFLOW NEEDS A SEPARATE PUSH CREDENTIAL (secrets.ISOBOT_PAT)
# ──────────────────────────────────────────────────────────────────────────
# The whole point of this feature is that the bot's generated-test commit
# re-triggers `ci.yml`'s `end-to-end-tests` job (which runs the new test) and
# in turn fires `post-pr-comment.yml`'s video-artifact comment.
#
# GitHub deliberately PREVENTS that chain when a commit is pushed using the
# default GITHUB_TOKEN: "events created by GITHUB_TOKEN do not create a new
# workflow run" (a recursion guard against infinite CI loops). A commit pushed
# with GITHUB_TOKEN would land silently and never run through CI — defeating the
# feature.
#
# The fix is to push with a DIFFERENT credential stored as `secrets.ISOBOT_PAT`.
# Pushes made with this token are attributed to its identity (not GITHUB_TOKEN),
# so they DO trigger `ci.yml`'s `pull_request: synchronize` run.
#
# REQUIRED token type (least-privilege — not optional):
#   • A GitHub App INSTALLATION token scoped to THIS repository only, with:
#       - `contents: write`  — to push the commit to the PR head branch.
#       - `workflow`         — required to push files under .github/workflows/
#                              (and any branch that carries them); without it the
#                              push is rejected with "refusing to allow ... to
#                              create or update workflow ... without `workflow`
#                              scope".
#   • Do NOT use a broad classic PAT or an org-wide fine-grained PAT. A
#     repo-scoped App installation token is the least-privilege option and keeps
#     blast radius to this one repo if the secret leaks.
# The `check-secrets` job below fails fast (with a clear ::error::) if this
# secret has not yet been provisioned by an admin.
#
# ──────────────────────────────────────────────────────────────────────────
# TRUST ASSUMPTION (read before changing the gate or the token)
# ──────────────────────────────────────────────────────────────────────────
# This `generate` job checks out PR-branch-controlled content and EXECUTES it
# (claude-code-action runs the skill with Bash) under a write-capable token.
# That is safe ONLY because BOTH of these hold:
#   1. The `gate` job restricts execution to PRs authored by OWNER/MEMBER — we
#      never run this on external-contributor branches.
#   2. ISOBOT_PAT is least-privilege: repo-scoped, contents:write only. A leaked
#      or abused token cannot reach other repos or org resources.
# Weaken either and this becomes an arbitrary-code-execution-with-write-token
# hole. Keep both.
#
# Residual risk: with `persist-credentials` at its default (true), the token is
# written into `.git/config` for the duration of the run. We keep the default
# because the skill's bare `git push` relies on it, and the token is equally
# reachable via the job env regardless. Possible future hardening:
# `persist-credentials: false` on checkout + have the skill push with an
# explicit authenticated remote URL — deferred, not adopted here.
# ──────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    types: [ready_for_review]

# Serialize per PR. Two `ready_for_review` events for the same PR (e.g. rapid
# draft→ready→draft→ready) would otherwise race two `git push`es; the second
# loses to a non-fast-forward reject and the skill has no rebase/retry. The
# sibling isobot-pr-review.yml omits this safely because it only posts comments
# (no push) — this workflow pushes, so it needs the guard.
# cancel-in-progress is safe: generation is idempotent and fully re-derivable
# from the PR, so cancelling a superseded run loses nothing.
concurrency:
  group: isobot-verify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Guards all downstream jobs — only passes if the event is an authorized
  # trigger. Downstream jobs use `needs: gate` so this condition is defined
  # exactly once. Mirrors isobot-pr-review.yml's gate, minus the issue_comment
  # branch (this workflow has no comment trigger).
  gate:
    # Authorize only when the PR is not a draft (a `ready_for_review` event can
    # only fire on a draft→ready transition, but assert it explicitly) AND the
    # author is an OWNER or MEMBER — never run on external-contributor PRs.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      contains(fromJSON('["OWNER", "MEMBER"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    steps:
      # GitHub Actions requires every job to have at least one step,
      # so provide a minimal no-op step since this job is just a gate.
      - run: echo "✅ Authorized"

  # Fails fast with a clear message if a required secret is missing, rather than
  # letting the generate job fail with a cryptic error deep in the run.
  check-secrets:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify ANTHROPIC_API_KEY is set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # See the header comment for why a PAT (not GITHUB_TOKEN) is mandatory: a
      # GITHUB_TOKEN push would not re-trigger ci.yml, so the generated test
      # would never run. This secret does not exist yet — an admin must add it.
      - name: Verify ISOBOT_PAT is set
        run: |
          if [ -z "$ISOBOT_PAT" ]; then
            echo "::error::ISOBOT_PAT secret is not set. This workflow pushes the generated test commit with a separate token (NOT GITHUB_TOKEN) so the push re-triggers ci.yml's end-to-end-tests job — a GITHUB_TOKEN push is suppressed by GitHub's recursion guard and would never run the test. An admin must provision a least-privilege GitHub App installation token scoped to THIS repo only, with contents:write (+ workflow scope, required to push files under .github/workflows/), and add it under Settings → Secrets and variables → Actions as ISOBOT_PAT. Do NOT use a broad classic PAT or an org-wide fine-grained PAT."
            exit 1
          fi
        env:
          ISOBOT_PAT: ${{ secrets.ISOBOT_PAT }}

  # Runs the /isobot-verify skill: it reads the PR's Manual Verification Steps,
  # generates a Playwright e2e test, commits it, pushes it to the PR branch, and
  # posts a PR comment. The skill writes /tmp/verify-result.json with the outcome.
  generate:
    needs: [gate, check-secrets]
    runs-on: ubuntu-latest
    permissions:
      contents: write # the skill pushes the generated-test commit
      pull-requests: write # the skill posts a PR comment
      id-token: write # required by anthropics/claude-code-action for OIDC-based tool authentication
    steps:
      # Check out the PR HEAD branch so the skill can commit/push to it.
      #   • ref: the PR's head branch (not the default merge ref) so `git push`
      #     updates the PR.
      #   • fetch-depth: 0 — the skill's idempotency fallback may run
      #     `git diff --name-only origin/<base>...HEAD`, which needs full history.
      #   • token: ISOBOT_PAT — NOT the default GITHUB_TOKEN. persist-credentials
      #     defaults to true, so the skill's `git push` reuses this PAT
      #     automatically, and the resulting push re-triggers ci.yml (see the
      #     header comment for the recursion-guard rationale).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.ISOBOT_PAT }}

      - uses: anthropics/claude-code-action@51705da45eecce209d4700538bf8377d5b5fc695
        env:
          # Matches the sibling isobot-pr-review.yml model for consistency. Note
          # that generating a real, convention-following e2e test is a heavier
          # task than the review skills (code-review/security-review just read +
          # comment); if generated-test quality proves insufficient in practice,
          # bump this to a stronger model.
          ANTHROPIC_MODEL: claude-sonnet-4-6
          # GITHUB_TOKEN is used by the skill's `gh pr view`/`gh pr comment`
          # calls. Note: the skill's `git push` uses the PAT from the checkout
          # above, NOT this token — the two credentials have distinct roles.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # allowedTools finding (verified against anthropics/claude-code-action
          # docs/configuration.md): `--allowedTools` is ADDITIVE to the action's
          # defaults, and the action does NOT permit arbitrary Bash by default
          # ("Claude does not have access to execute arbitrary Bash commands by
          # default"). The isobot-verify skill shells out heavily — `gh`, `git
          # add/commit/push`, `jq`, writing the test file — so Bash MUST be
          # granted explicitly. A bare `Bash` (no parentheses) grants all bash
          # commands; scoped `Bash(cmd)` would be too narrow for the skill's
          # open-ended shelling. Read/Write are included so the skill can read
          # conventions/fixtures and write the generated test. The sibling
          # review skills use only `--allowedTools Write` because they merely
          # read+comment via the action's default GitHub tooling; this skill's
          # commit/push/jq work needs Bash on top.
          claude_args: "--allowedTools Write,Read,Bash"
          prompt: /isobot-verify ${{ github.event.pull_request.number }}

      # Surface the skill's outcome in the job log and the run's step summary.
      # Best-effort: the result file may legitimately be absent — several
      # SKILL.md early-abort paths (e.g. PR number unresolved, PR body fetch
      # fails) exit before writing it. The `else` branch handles that case, and
      # `if: always()` is intentional so we still summarize even when the
      # claude-code-action step above failed.
      - name: Summarize verification result
        if: always()
        run: |
          if [ -f /tmp/verify-result.json ]; then
            generated=$(jq -r '.generated' /tmp/verify-result.json)
            path=$(jq -r '.path' /tmp/verify-result.json)
            reason=$(jq -r '.reason' /tmp/verify-result.json)
            {
              echo "### 🤖 IsoBot Verify result"
              echo ""
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Generated | \`$generated\` |"
              echo "| Path | \`$path\` |"
              echo "| Reason | $reason |"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Generated: $generated"
            echo "Path: $path"
            echo "Reason: $reason"
          else
            echo "No /tmp/verify-result.json was written by the skill." >> "$GITHUB_STEP_SUMMARY"
            echo "No /tmp/verify-result.json was written by the skill."
          fi
