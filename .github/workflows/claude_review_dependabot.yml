name: 🤖 Claude Review (Dependabot)

on:
  pull_request:
    types:
      - opened # Only run for new Dependabot PRs
      - ready_for_review # Allow manual re-runs by marking the PR as ready for review

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write # needed to write the review comment
  id-token: write # needed to fetch OIDC token for Claude Code Action

jobs:
  review:
    if: startsWith(github.event.pull_request.head.ref, 'dependabot/') # Only run for Dependabot PRs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Claude Code Action (review)
        uses: anthropics/claude-code-action@64de744025ca9e24df2b88204b4f1e968f39f009 # v1.0.139
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          allowed_bots: "dependabot[bot]"

          claude_args: |
            --model claude-sonnet-4-6

          prompt: |
            /review-dependency-upgrade
