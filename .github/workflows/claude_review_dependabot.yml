name: 🤖 Claude Review

on:
  pull_request:
    types:
      - opened # Only run for new Dependabot PRs
      - labeled # Allow manual triggering by adding the 'review-dependency-upgrade' label

permissions:
  contents: read
  pull-requests: write # needed to write the review comment
  issues: write # needed to remove the 'review-dependency-upgrade' label after review
  id-token: write # needed to fetch OIDC token for Claude Code Action

jobs:
  dependabot-review:
    # Only run for Dependabot PRs; label trigger allows manual re-runs
    # 'opened' events have no label, so pass them through unconditionally
    # for 'labeled' events, only proceed for this specific label
    if: >-
      startsWith(github.event.pull_request.head.ref, 'dependabot/') &&
      (
        github.event.action == 'opened' ||
        github.event.label.name == 'review-dependency-upgrade'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Headless CI cannot answer permission prompts — pre-allow everything the
      # review-dependency-upgrade skill needs (web research, codebase search, gh).
      - name: Run Claude Code Action (review)
        uses: anthropics/claude-code-action@64de744025ca9e24df2b88204b4f1e968f39f009 # v1.0.139
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          track_progress: ${{ github.event.action == 'opened' }} # track_progress only supports opened/synchronize/ready_for_review/reopened
          allowed_bots: dependabot[bot]
          prompt: /review-dependency-upgrade
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "WebFetch"
            --allowedTools "WebSearch"
            --allowedTools "Read"
            --allowedTools "Glob"
            --allowedTools "Grep"
            --allowedTools "Write(/tmp/**)"
            --allowedTools "Bash(gh pr view:*)"
            --allowedTools "Bash(gh pr diff:*)"
            --allowedTools "Bash(gh pr comment:*)"
            --allowedTools "Bash(git diff:*)"
          settings: |
            {
              "permissions": {
                "allow": [
                  "WebFetch",
                  "WebSearch",
                  "Read",
                  "Glob",
                  "Grep",
                  "Write(/tmp/**)",
                  "Bash(gh pr view:*)",
                  "Bash(gh pr diff:*)",
                  "Bash(gh pr comment:*)",
                  "Bash(git diff:*)"
                ]
              }
            }

      # Always remove the label after review (success or failure) so it can be re-added to re-trigger
      - name: Remove 'review-dependency-upgrade' label
        if: >-
          always() &&
          github.event.action == 'labeled' &&
          github.event.label.name == 'review-dependency-upgrade'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'review-dependency-upgrade',
            })
