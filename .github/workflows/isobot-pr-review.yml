name: "🤖 IsoBot: PR Review"

# Runs when a non-draft PR is opened or converted from draft to ready, or when a
# member comments /isobot-review after pushing fixes. Does NOT run on every
# synchronize — keep the PR in draft while iterating to avoid burning review cycles.
on:
  pull_request:
    types: [ready_for_review, opened]
  issue_comment:
    types: [created]

jobs:
  # Guards all downstream jobs — only passes if the event is an authorized trigger.
  # Downstream jobs use `needs: gate` so this condition is defined exactly once.
  gate:
    # Only run this job if the event matches one of these authorized triggers:
    # 1. The event is a 'pull_request', the PR is not a draft, and the author is an OWNER or MEMBER.
    #    Covers both 'opened' (PR created ready) and 'ready_for_review' (draft converted to ready).
    # 2. The event is a 'issue_comment', the comment is on a PR,
    #    the comment starts with '/isobot-review', and the comment author is an OWNER or MEMBER.
    if: |
      (
        github.event_name == 'pull_request' &&
        !github.event.pull_request.draft &&
        contains(fromJSON('["OWNER", "MEMBER"]'), github.event.pull_request.author_association)
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/isobot-review') &&
        contains(fromJSON('["OWNER", "MEMBER"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    steps:
      # GitHub Actions requires every job to have at least one step,
      # so provide a minimal no-op step since this job is just a gate.
      - run: echo "✅ Authorized"

  # Fails fast with a clear message if the Anthropic API key is missing,
  # rather than letting the three review jobs fail with a cryptic error.
  check-secrets:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify ANTHROPIC_API_KEY is set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # Reads docs/risk-taxonomy.md, diffs the PR, applies file-glob rules and
  # reversibility modifiers, and outputs the tier for auto-approve gating.
  compute-risk-tier:
    needs: [gate, check-secrets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # required by anthropics/claude-code-action for OIDC-based tool authentication
    outputs:
      tier: ${{ steps.result.outputs.tier }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d
        env:
          ANTHROPIC_MODEL: claude-sonnet-4-6
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Write"
          prompt: /compute-risk-tier ${{ github.event_name == 'issue_comment' && github.event.issue.number || github.event.pull_request.number }}

      - name: Read risk tier result
        id: result
        run: |
          if [ -f /tmp/risk-result.json ]; then
            echo "tier=$(jq -r .tier /tmp/risk-result.json)" >> "$GITHUB_OUTPUT"
          else
            # Fail open — if skill didn't write a result, default to high
            echo "tier=high" >> "$GITHUB_OUTPUT"
          fi

  # Posts severity-tagged findings (Must Fix / Consider) and writes
  # {"blocking": true/false} to /tmp/review-result.json for the auto-approve gate.
  code-review:
    needs: [gate, check-secrets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # required by anthropics/claude-code-action for OIDC-based tool authentication
    outputs:
      blocking: ${{ steps.result.outputs.blocking }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d
        env:
          ANTHROPIC_MODEL: claude-sonnet-4-6
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Write"
          prompt: /code-review ${{ github.event_name == 'issue_comment' && github.event.issue.number || github.event.pull_request.number }}

      - name: Read code review result
        id: result
        run: |
          if [ -f /tmp/review-result.json ]; then
            echo "blocking=$(jq -r .blocking /tmp/review-result.json)" >> "$GITHUB_OUTPUT"
          else
            # Fail open — if skill didn't write a result, don't auto-approve
            echo "blocking=true" >> "$GITHUB_OUTPUT"
          fi

  # Checks for IDOR, missing auth, XSS, unvalidated input, missing audit events,
  # and other Isomer-specific security issues. Separate from code-review so its
  # findings are always visible even when code-review is clean.
  security-review:
    needs: [gate, check-secrets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # required by anthropics/claude-code-action for OIDC-based tool authentication
    outputs:
      blocking: ${{ steps.result.outputs.blocking }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d
        env:
          ANTHROPIC_MODEL: claude-sonnet-4-6
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Write"
          prompt: /security-review ${{ github.event_name == 'issue_comment' && github.event.issue.number || github.event.pull_request.number }}

      - name: Read security review result
        id: result
        run: |
          if [ -f /tmp/security-result.json ]; then
            echo "blocking=$(jq -r .blocking /tmp/security-result.json)" >> "$GITHUB_OUTPUT"
          else
            # Fail open — if skill didn't write a result, don't auto-approve
            echo "blocking=true" >> "$GITHUB_OUTPUT"
          fi

  # Submits a formal GitHub APPROVE review for risk:low PRs that pass both
  # reviews. Counts toward required-approvals branch protection. A human still
  # clicks merge — this never auto-merges.
  auto-approve:
    needs: [compute-risk-tier, code-review, security-review]
    if: |
      needs.compute-risk-tier.outputs.tier == 'low' &&
      needs.code-review.outputs.blocking == 'false' &&
      needs.security-review.outputs.blocking == 'false'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@f0939ea97e9205ef24d872e76833fa908a770363 # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event_name == 'issue_comment' && github.event.issue.number || github.event.pull_request.number }}
          review-message: |
            🤖 All clear!
            - 🟢 Risk: low
            - 👀 Code review: no blockers
            - 🔒 Security: no blockers

            Still needs a human to merge — this just clears the approvals gate.

            <sub>Posted by [🤖 IsoBot: PR Review](https://github.com/opengovsg/isomer/blob/main/.github/workflows/isobot-pr-review.yml)</sub>
