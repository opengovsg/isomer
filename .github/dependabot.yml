version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    versioning-strategy: increase
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7 # to mitigate supply chain attacks
    groups:
      aws-sdk:
        applies-to: version-updates
        patterns:
          - "@aws-sdk/*"
      babel:
        applies-to: version-updates
        patterns:
          - "@babel/*"
      lodash-es:
        applies-to: version-updates
        patterns:
          - "lodash-es"
          - "@types/lodash-es"
      next:
        applies-to: version-updates
        patterns:
          - "next"
          - "@next/env"
      pg:
        applies-to: version-updates
        patterns:
          - "pg"
          - "@types/pg"
      playwright:
        applies-to: version-updates
        patterns:
          - "playwright"
          - "@playwright/test"
      prisma:
        applies-to: version-updates
        patterns:
          - "@prisma/*"
          - "prisma"
      react:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tanstack-query:
        applies-to: version-updates
        patterns:
          - "@tanstack/query-devtools"
          - "@tanstack/react-query"
          - "@tanstack/react-query-devtools"
      tiptap:
        applies-to: version-updates
        patterns:
          - "@tiptap/*"
      trpc:
        applies-to: version-updates
        patterns:
          - "@trpc/*"
      validator:
        applies-to: version-updates
        patterns:
          - "validator"
          - "@types/validator"
      vitest:
        applies-to: version-updates
        patterns:
          - "vite"
          - "vite-tsconfig-paths"
          - "vitest"
          - "@vitest/*"
          - "@vitejs/*"
      jsonforms:
        applies-to: version-updates
        patterns:
          - "@jsonforms/core"
          - "@jsonforms/react"
      casl:
        applies-to: version-updates
        patterns:
          - "@casl/*"
      react-aria:
        applies-to: version-updates
        patterns:
          - "@react-aria/*"
          - "@react-stately/*"
    ignore:
      # Currently dependabot doesn't support ignoring by group so we have to ignore each dependency individually
      # Ignore major version updates for react — we cannot upgrade to React 19 yet because some dependencies
      # like @chakra-ui/react v2 (from the OGP design system) don't support React 19
      ### React 19
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # @chakra-ui/react and @chakra-ui/cli v3 require a full Chakra UI v3 migration.
      # @chakra-ui/react v2 is pinned to the OGP design system version.
      # chakra-react-select v6 requires Chakra UI v3 (imports Separator, Span, useChakraContext etc. not present in v2).
      - dependency-name: "@chakra-ui/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@chakra-ui/cli"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chakra-react-select"
        update-types: ["version-update:semver-major"]
      - dependency-name: "algoliasearch"
        update-types: ["version-update:semver-major"]
      # Storybook 10.5.x breaks interactive stories: its instrumented
      # HTMLElement.prototype.focus getter conflicts with
      # @zag-js/focus-visible (used by Chakra/@opengovsg/design-system-react),
      # throwing "Illegal invocation" on any story that opens a Chakra Menu.
      # Pinned to 10.4.6 until fixed upstream — remove once resolved.
      # These packages were also removed from the `storybook` update group
      # above — grouped updates don't reliably respect per-dependency
      # `update-types` ignores, so an ungrouped ignore is the only way to
      # actually block them.
      ### Storybook 10.5
      - dependency-name: "storybook"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@storybook/addon-a11y"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@storybook/addon-docs"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@storybook/addon-links"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@storybook/addon-themes"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@storybook/nextjs"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@storybook/react-vite"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "eslint-plugin-storybook"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "storybook-addon-pseudo-states"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7 # to mitigate supply chain attacks
    groups:
      # github/codeql-action ships init/analyze/autobuild/upload-sarif from
      # a single repo and requires them to be pinned to the same release —
      # group them so Dependabot bumps them together in one PR instead of
      # leaving them mismatched.
      codeql:
        patterns:
          - "github/codeql-action/*"
