version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    versioning-strategy: increase
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7 # to mitigate supply chain attacks
    groups:
      aws-sdk:
        applies-to: version-updates
        patterns:
          - "@aws-sdk/*"
      babel:
        applies-to: version-updates
        patterns:
          - "@babel/*"
      lodash-es:
        applies-to: version-updates
        patterns:
          - "lodash-es"
          - "@types/lodash-es"
      next:
        applies-to: version-updates
        patterns:
          - "next"
          - "@next/env"
      pg:
        applies-to: version-updates
        patterns:
          - "pg"
          - "@types/pg"
      prisma:
        applies-to: version-updates
        patterns:
          - "@prisma/*"
          - "prisma"
      react:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tanstack-query:
        applies-to: version-updates
        patterns:
          - "@tanstack/query-devtools"
          - "@tanstack/react-query"
          - "@tanstack/react-query-devtools"
      storybook:
        applies-to: version-updates
        patterns:
          - "@storybook/*"
          - "storybook"
          - "storybook-addon-pseudo-states"
          - "eslint-plugin-storybook"
      tiptap:
        applies-to: version-updates
        patterns:
          - "@tiptap/*"
      trpc:
        applies-to: version-updates
        patterns:
          - "@trpc/*"
      validator:
        applies-to: version-updates
        patterns:
          - "validator"
          - "@types/validator"
      vitest:
        applies-to: version-updates
        patterns:
          - "vite"
          - "vite-tsconfig-paths"
          - "vitest"
          - "@vitest/*"
          - "@vitejs/*"
      jsonforms:
        applies-to: version-updates
        patterns:
          - "@jsonforms/core"
          - "@jsonforms/react"
      casl:
        applies-to: version-updates
        patterns:
          - "@casl/*"
      react-aria:
        applies-to: version-updates
        patterns:
          - "@react-aria/*"
          - "@react-stately/*"
    ignore:
      # Currently dependabot doesn't support ignoring by group so we have to ignore each dependency individually
      # Ignore major version updates for react — we cannot upgrade to React 19 yet because some dependencies
      # like @chakra-ui/react v2 (from the OGP design system) don't support React 19
      ### React 19
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # @chakra-ui/react and @chakra-ui/cli v3 require a full Chakra UI v3 migration.
      # @chakra-ui/react v2 is pinned to the OGP design system version.
      # chakra-react-select v6 requires Chakra UI v3 (imports Separator, Span, useChakraContext etc. not present in v2).
      - dependency-name: "@chakra-ui/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@chakra-ui/cli"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chakra-react-select"
        update-types: ["version-update:semver-major"]
      - dependency-name: "algoliasearch"
        update-types: ["version-update:semver-major"]
      # jsdom is pinned to 27.x (catalog + pnpm overrides in pnpm-workspace.yaml).
      # jsdom >=28 moved its encoding stack to the ESM-only `@exodus/bytes`, which the
      # CJS jsdom/html-encoding-sniffer `require()`. Next 16 builds with Turbopack and
      # loads jsdom as an external (serverExternalPackages), so at runtime it hits a
      # native require() of ESM → ERR_REQUIRE_ESM and the Vercel server crashes. Do not
      # let Dependabot bump jsdom off 27 until isomorphic-dompurify/jsdom ship a build
      # that loads `@exodus/bytes` via dynamic import (or we stop externalizing jsdom).
      - dependency-name: "jsdom"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7 # to mitigate supply chain attacks
