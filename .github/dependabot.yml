version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    versioning-strategy: increase
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7 # to mitigate supply chain attacks
    groups:
      aws-sdk:
        applies-to: version-updates
        patterns:
          - "@aws-sdk/*"
      babel:
        applies-to: version-updates
        patterns:
          - "@babel/*"
      lodash-es:
        applies-to: version-updates
        patterns:
          - "lodash-es"
          - "@types/lodash-es"
      next:
        applies-to: version-updates
        patterns:
          - "next"
          - "@next/env"
      pg:
        applies-to: version-updates
        patterns:
          - "pg"
          - "@types/pg"
      prisma:
        applies-to: version-updates
        patterns:
          - "@prisma/client"
          - "prisma"
      react:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tanstack-query:
        applies-to: version-updates
        patterns:
          - "@tanstack/query-devtools"
          - "@tanstack/react-query"
          - "@tanstack/react-query-devtools"
      storybook:
        applies-to: version-updates
        patterns:
          - "@storybook/*"
          - "storybook"
      tiptap:
        applies-to: version-updates
        patterns:
          - "@tiptap/*"
      trpc:
        applies-to: version-updates
        patterns:
          - "@trpc/*"
      validator:
        applies-to: version-updates
        patterns:
          - "validator"
          - "@types/validator"
      vitest:
        applies-to: version-updates
        patterns:
          - "vite"
          - "vite-tsconfig-paths"
          - "vitest"
          - "@vitest/*"
          - "@vitejs/*"
      jsonforms:
        applies-to: version-updates
        patterns:
          - "@jsonforms/core"
          - "@jsonforms/react"
    ignore:
      # Currently dependabot doesn't support ignoring by group so we have to ignore each dependency individually
      # Ignore major version updates for react, trpc as they rely on React 19
      ### React 19
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      ### TRPC 11
      - dependency-name: "@trpc/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@trpc/next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@trpc/react-query"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@trpc/server"
        update-types: ["version-update:semver-major"]
      # Ignore major version updates for Prisma 6 due to installation issues
      ### Could not resolve @prisma/client despite the installation that we just tried.
      ### Please try to install it by hand with `pnpm add @prisma/client` and rerun `pnpm exec prisma generate` 🙏.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      # @chakra-ui/react and @chakra-ui/cli v3 require a full Chakra UI v3 migration.
      # @chakra-ui/react v2 is pinned to the OGP design system version.
      - dependency-name: "@chakra-ui/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@chakra-ui/cli"
        update-types: ["version-update:semver-major"]
      # markdown-to-jsx is only used in the unmaintained classic template; skip all updates
      - dependency-name: "markdown-to-jsx"
